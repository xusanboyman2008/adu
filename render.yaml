# render.yaml — Render.com deployment configuration
# Deploy as a "Web Service" on https://render.com

services:
  - type: web
    name: coursera-runner
    runtime: node
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Headless — no display on a server
      - key: HEADLESS
        value: "y"

      # Fully-automated mode
      - key: MODE
        value: auto

      # ── CRITICAL: must match what build.sh sets during build ──────────────
      # Render uploads only /opt/render/project/src/; ~/.cache is discarded.
      # Browsers must live inside the project dir to survive build→runtime.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/pw-browsers

      # Coordinator — default from config.json
      - key: COORDINATOR_URL
        value: "https://script.google.com/macros/s/AKfycbzl3TijKis8trT9-_K8EMDwEj6a0tm7itxcV9w8nlZPO0PkaHo1lc2JGQCrHLlCO8WuEQ/exec"

      - key: PC_ID
        value: render-1

      - key: SPEED
        value: "1"

      - key: VPN
        value: "n"

      - key: CONCURRENCY
        value: "1"

      - key: CERT_ATTEMPTS
        value: "12"

      - key: CERT_WAIT_MS
        value: "15000"
