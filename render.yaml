# render.yaml — Render.com deployment (Docker)
# Uses the official Playwright Docker image so browsers are baked into
# the container image — no build-vs-runtime filesystem issues.

services:
  - type: web
    name: coursera-runner
    runtime: docker
    plan: free
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: HEADLESS
        value: "y"

      - key: MODE
        value: auto

      - key: COORDINATOR_URL
        value: "https://script.google.com/macros/s/AKfycbzl3TijKis8trT9-_K8EMDwEj6a0tm7itxcV9w8nlZPO0PkaHo1lc2JGQCrHLlCO8WuEQ/exec"

      - key: PC_ID
        value: render-1

      - key: SPEED
        value: "1"

      - key: VPN
        value: "n"

      - key: CONCURRENCY
        value: "1"

      - key: CERT_ATTEMPTS
        value: "12"

      - key: CERT_WAIT_MS
        value: "15000"
