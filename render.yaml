# render.yaml — Render.com deployment configuration

services:
  - type: web
    name: coursera-runner
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: npm start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: HEADLESS
        value: "y"

      - key: MODE
        value: auto

      # MUST match the path set inside build.sh
      # Render uploads /opt/render/project/src/ but NOT ~/.cache
      # so browsers must live inside the project dir
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/pw-browsers

      - key: COORDINATOR_URL
        value: "https://script.google.com/macros/s/AKfycbzl3TijKis8trT9-_K8EMDwEj6a0tm7itxcV9w8nlZPO0PkaHo1lc2JGQCrHLlCO8WuEQ/exec"

      - key: PC_ID
        value: render-1

      - key: SPEED
        value: "1"

      - key: VPN
        value: "n"

      - key: CONCURRENCY
        value: "1"

      - key: CERT_ATTEMPTS
        value: "12"

      - key: CERT_WAIT_MS
        value: "15000"
